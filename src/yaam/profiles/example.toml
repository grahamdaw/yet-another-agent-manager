[profile]
name = "example"
description = "Example agent profile — customize for your project"

[repo]
path = "~/projects/my-repo"           # base repo path; wt operates from here
default_branch_prefix = "agent/"      # branch names become e.g. agent/my-feature

[init]
script = "~/.config/yaam/scripts/example-init.sh"
# called after worktree setup, before tmux; receives repo_path as $1 and worktree_path as $2
# responsible for: copying .env files, installing deps, starting dev server, etc.
env = { MY_VAR = "value" }            # extra env vars injected into the init script

[tmux]
setup_script = "~/.config/yaam/scripts/example-tmux.sh"
# your existing tmux layout script; called with session name as $1 and worktree path as $2
